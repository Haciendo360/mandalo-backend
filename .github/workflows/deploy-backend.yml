name: Deploy Backend to Railway

# Solo hace deploy si CI-Tests termina y pasa en verde.
on:
  workflow_run:
    workflows: ["CI Tests (MANDALO)"]
    types:
      - completed
    branches: [ "main" ]

jobs:
  deploy-railway:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    
    # Exigir que GitHub diga 'success' en el workflow de tests.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Railway CLI
      run: npm i -g @railway/cli

    - name: Railway Deploy
      run: railway up --detach --service mandalo-backend
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
