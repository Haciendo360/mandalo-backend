name: Deploy Frontend PWA to Vercel

on:
  workflow_run:
    workflows: ["CI Tests (MANDALO)"]
    types:
      - completed
    branches: [ "main" ]

jobs:
  deploy-vercel:
    name: Build & Deploy Reflex to Vercel
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Reflex PWA (Frontend)
      run: |
        # Reflex export compila ReactJS + NextJS por debajo generando estáticos puros
        reflex export --frontend-only

    - name: Deploy Static Web to Vercel Edge
      run: npx vercel deploy .web/_static --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
      
        
        
        
        # Apuntamos a la carpeta .web que genera Reflex donde aloja el site final exportado
        

