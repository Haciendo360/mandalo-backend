name: Deploy Frontend PWA to Vercel

on:
  workflow_run:
    workflows: ["CI Tests (MANDALO)"]
    types:
      - completed
    branches: [ "main" ]

jobs:
  deploy-vercel:
    name: Build & Deploy Reflex to Vercel
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Reflex PWA (Frontend)
      run: |
        reflex export --frontend-only
        mkdir -p .vercel/output/static
        cp -r .web/_static/* .vercel/output/static/
        echo '{"version": 3}' > .vercel/output/config.json

    - name: Deploy Static Web to Vercel Edge
      run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
